<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicFloat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="titlebar">
      <button id="lock-btn" class="icon-btn" title="锁定/解锁位置">
        <svg id="lock-icon" viewBox="0 0 24 24" width="14" height="14">
          <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM9 8V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9z"/>
        </svg>
        <svg id="unlock-icon" viewBox="0 0 24 24" width="14" height="14" style="display:none">
          <path d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h2c0-1.66 1.34-3 3-3s3 1.34 3 3v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2z"/>
        </svg>
      </button>
      <select id="folder-select"></select>
      <button id="open-dir-btn" class="icon-btn" title="打开文件夹">
        <svg viewBox="0 0 24 24" width="14" height="14">
          <path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/>
        </svg>
      </button>
      <button id="ghost-btn" class="icon-btn" title="幽灵模式">
        <svg viewBox="0 0 24 24" width="14" height="14">
          <path d="M12 2C6.48 2 2 6.48 2 12v8c0 1.1.9 2 2 2h1.5c.83 0 1.5-.67 1.5-1.5S6.83 19 6 19H4v-1h2.5c.83 0 1.5-.67 1.5-1.5S7.33 15 6.5 15H4v-1h2.5c.83 0 1.5-.67 1.5-1.5S7.33 11 6.5 11H4v-1c0-4.42 3.58-8 8-8s8 3.58 8 8v1h-2.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5H20v1h-2.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5H20v1h-1.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5H20c1.1 0 2-.9 2-2v-8c0-5.52-4.48-10-10-10zM9 12c-.83 0-1.5-.67-1.5-1.5S8.17 9 9 9s1.5.67 1.5 1.5S9.83 12 9 12zm6 0c-.83 0-1.5-.67-1.5-1.5S14.17 9 15 9s1.5.67 1.5 1.5S15.83 12 15 12z"/>
        </svg>
      </button>
      <button id="close-btn" class="icon-btn close-btn" title="关闭">
        <svg viewBox="0 0 24 24" width="14" height="14">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>

    <div id="progress-area">
      <span id="time-current">0:00</span>
      <div id="progress-bar">
        <div id="progress-fill"></div>
        <div id="progress-thumb"></div>
      </div>
      <span id="time-total">0:00</span>
    </div>

    <div id="controls">
      <button id="mode-btn" class="icon-btn sm" title="播放模式">
        <svg id="mode-loop" viewBox="0 0 24 24" width="16" height="16">
          <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
        </svg>
        <svg id="mode-one" viewBox="0 0 24 24" width="16" height="16" style="display:none">
          <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
          <text x="12" y="15" text-anchor="middle" font-size="7" fill="currentColor" font-weight="bold">1</text>
        </svg>
        <svg id="mode-seq" viewBox="0 0 24 24" width="16" height="16" style="display:none">
          <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
        </svg>
        <svg id="mode-shuffle" viewBox="0 0 24 24" width="16" height="16" style="display:none">
          <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
        </svg>
      </button>
      <button id="prev-btn" class="icon-btn" title="上一首">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
        </svg>
      </button>
      <button id="play-btn" class="icon-btn play" title="播放/暂停">
        <svg id="icon-play" viewBox="0 0 24 24" width="24" height="24">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg id="icon-pause" viewBox="0 0 24 24" width="24" height="24" style="display:none">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>
      <button id="next-btn" class="icon-btn" title="下一首">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
        </svg>
      </button>
      <button id="vol-btn" class="icon-btn sm" title="静音">
        <svg id="vol-on" viewBox="0 0 24 24" width="16" height="16">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        <svg id="vol-off" viewBox="0 0 24 24" width="16" height="16" style="display:none">
          <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
        </svg>
      </button>
    </div>

    <div id="playlist"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
